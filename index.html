<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Banco de Horas — Gummy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --azul-forte:#2B2BE6;--azul-escuro:#1515B8;--azul-claro:#EEF0FF;
  --azul-secao:#E6F1FB;--roxo-sutil:#EEEDFE;--amarelo:#E8FF00;
  --creme:#FAFAF2;--cinza:#F7F7F7;--branco:#FFFFFF;
  --texto:#1A1A1A;--texto2:#888888;--azul-med:#3C3489;--borda:#CCCCCC;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Red Hat Display',sans-serif;background:var(--cinza);color:var(--texto);font-size:14px;line-height:1.5}
.app{max-width:1200px;margin:0 auto;padding:24px 16px}
.header{background:var(--azul-forte);padding:20px 24px 14px}
.header h1{font-size:18px;font-weight:700;color:var(--amarelo)}
.header-sub{background:var(--amarelo);padding:6px 24px;font-size:11px;font-weight:600;color:var(--texto);letter-spacing:.04em;text-transform:uppercase}
.atualizado{font-size:10px;color:rgba(232,255,0,.7);margin-top:4px}
.badge{background:var(--amarelo);color:var(--azul-escuro);font-size:10px;font-weight:700;padding:2px 8px;letter-spacing:.04em;text-transform:uppercase;margin-left:10px;vertical-align:middle}
.badge-proj{background:var(--roxo-sutil);color:var(--azul-med);font-size:9px;font-weight:700;padding:1px 6px;letter-spacing:.03em;text-transform:uppercase;vertical-align:middle}
.toolbar{background:var(--branco);border-bottom:1px solid var(--borda);padding:10px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{height:32px;padding:0 10px;border:1px solid var(--borda);font-family:'Red Hat Display',sans-serif;font-size:12px;color:var(--texto);background:var(--creme);outline:none}
.toolbar input:focus,.toolbar select:focus{border-color:var(--azul-forte)}
.tabs{background:var(--branco);border-bottom:2px solid var(--azul-forte);padding:0 24px;display:flex}
.tab{padding:10px 20px;font-size:12px;font-weight:500;font-family:'Red Hat Display',sans-serif;border:none;background:none;color:var(--texto2);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;letter-spacing:.02em}
.tab.active{color:var(--azul-forte);border-bottom-color:var(--azul-forte);font-weight:700}
.tab:hover:not(.active){color:var(--texto);background:var(--azul-claro)}
.content{padding:20px 0}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1px;margin-bottom:20px;border:1px solid var(--borda);background:var(--borda)}
.card{background:var(--branco);padding:16px 20px}
.card-label{font-size:10px;font-weight:700;color:var(--texto2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.card-value{font-size:24px;font-weight:700;color:var(--texto)}
.card-value.warn{color:var(--azul-forte)}
.card-value.ok{color:#16A34A}
.section-hdr{background:var(--azul-secao);color:#0C447C;font-size:11px;font-weight:700;padding:8px 16px;letter-spacing:.04em;text-transform:uppercase;border-left:3px solid var(--azul-forte);margin-bottom:0}
.chart-box{background:var(--branco);border:1px solid var(--borda);margin-bottom:16px}
.chart-inner{padding:16px 20px}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--texto2)}
.legend-sq{width:10px;height:10px;border-radius:1px;flex-shrink:0}
.table-wrap{overflow-x:auto;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--azul-escuro);color:var(--branco);font-size:10px;font-weight:700;text-align:left;padding:8px 12px;white-space:nowrap;letter-spacing:.04em;text-transform:uppercase}
tbody td{padding:8px 12px;border-bottom:1px solid var(--borda);vertical-align:middle}
tbody tr:nth-child(even) td{background:var(--azul-claro)}
tbody tr:nth-child(odd) td{background:var(--branco)}
tbody tr:hover td{background:var(--roxo-sutil)}
.pill{display:inline-block;padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:.03em;white-space:nowrap}
.pill-warn{background:var(--amarelo);color:var(--azul-escuro)}
.pill-danger{background:var(--azul-forte);color:var(--amarelo)}
.pill-none{background:var(--cinza);color:var(--texto2)}
.pill-proj{background:var(--roxo-sutil);color:var(--azul-med);border:1px dashed var(--azul-med)}
.bar-wrap{display:flex;align-items:center;gap:8px}
.bar-bg{height:6px;flex:1;min-width:60px;background:var(--azul-claro)}
.bar-fill{height:100%}
.month-row td{background:var(--roxo-sutil)!important;color:var(--azul-med);font-weight:700;font-size:12px;padding:8px 12px}
.no-data{text-align:center;padding:32px;color:var(--texto2);font-size:13px}
.indent{padding-left:28px!important}
.proj-col{background:rgba(238,237,254,0.5)!important;border-left:2px dashed var(--azul-med)!important}
.nota-proj{font-size:11px;color:var(--azul-med);background:var(--roxo-sutil);padding:8px 16px;margin-bottom:16px;border-left:3px solid var(--azul-med)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div style="display:flex;align-items:center">
      <h1>Banco de Horas <span class="badge">FIFO</span></h1>
    </div>
    <div class="atualizado" id="atualizado"></div>
  </div>
  <div class="header-sub">Gummy Conteúdo Inteligente &nbsp;·&nbsp; Saldo a vencer — histórico + projeção futura</div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Buscar colaborador..." style="width:200px">
    <select id="mes-filter"><option value="">Todos os meses</option></select>
    <select id="tipo-filter">
      <option value="todos">Histórico + Projeção</option>
      <option value="proj">Só projeção futura</option>
      <option value="hist">Só histórico</option>
    </select>
    <select id="sort-by">
      <option value="nome">Ordenar por nome</option>
      <option value="vence-desc">Maior saldo a vencer</option>
      <option value="acum-desc">Maior saldo acumulado</option>
    </select>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="visao-geral">Visão geral</button>
    <button class="tab" data-tab="por-colaborador">Por colaborador</button>
    <button class="tab" data-tab="timeline">Timeline de vencimentos</button>
  </div>

  <div class="content">
    <div id="tab-visao-geral"></div>
    <div id="tab-por-colaborador" style="display:none"></div>
    <div id="tab-timeline" style="display:none"></div>
  </div>
</div>

const ALL_MONTHS = [...new Set(DATA.flatMap(c=>c.months.map(m=>m.sort)))].sort();
const MONTH_LABELS = {};
DATA.forEach(c=>c.months.forEach(m=>{MONTH_LABELS[m.sort]=m.label;}));

// Identificar meses de projeção (futuros) vs histórico
const PROJ_MONTHS = new Set(DATA.flatMap(c=>c.months.filter(m=>m.projecao).map(m=>m.sort)));
const HIST_MONTHS = new Set(DATA.flatMap(c=>c.months.filter(m=>!m.projecao).map(m=>m.sort)));

const sel=document.getElementById('mes-filter');
ALL_MONTHS.forEach(s=>{
  const o=document.createElement('option');
  o.value=s;
  o.textContent=MONTH_LABELS[s]+(PROJ_MONTHS.has(s)?' ◆':' ●');
  sel.appendChild(o);
});

let activeTab='visao-geral',cGeral=null,cTimeline=null;

function fmt(min){
  if(!min&&min!==0)return'—';if(min===0)return'—';
  const h=Math.floor(Math.abs(min)/60),m=Math.abs(min)%60,sg=min<0?'-':'';
  return sg+h+'h'+(m>0?String(m).padStart(2,'0'):'');
}

function getMesesFiltrados(){
  const tipo=document.getElementById('tipo-filter').value;
  if(tipo==='proj') return ALL_MONTHS.filter(s=>PROJ_MONTHS.has(s));
  if(tipo==='hist') return ALL_MONTHS.filter(s=>HIST_MONTHS.has(s));
  return ALL_MONTHS;
}

function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const so=document.getElementById('sort-by').value;
  let d=DATA.filter(c=>!q||c.name.toLowerCase().includes(q));
  if(so==='vence-desc') d=[...d].sort((a,b)=>b.months.reduce((s,m)=>s+m.vence_min,0)-a.months.reduce((s,m)=>s+m.vence_min,0));
  else if(so==='acum-desc') d=[...d].sort((a,b)=>(b.months.at(-1)?.acum_min||0)-(a.months.at(-1)?.acum_min||0));
  return d;
}

function switchTab(t){
  activeTab=t;
  ['visao-geral','por-colaborador','timeline'].forEach(x=>document.getElementById('tab-'+x).style.display=x===t?'':'none');
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));
  render();
}
document.querySelectorAll('.tab').forEach(el=>el.addEventListener('click',()=>switchTab(el.dataset.tab)));
['search','mes-filter','tipo-filter','sort-by'].forEach(id=>document.getElementById(id).addEventListener('change',render));
document.getElementById('search').addEventListener('input',render);

const C_AZUL='#2B2BE6',C_AMARELO='#E8FF00',C_ROXO='#EEEDFE',C_CLARO='#EEF0FF';

function renderVisaoGeral(data){
  const meses = getMesesFiltrados();
  const vpm={};
  ALL_MONTHS.forEach(s=>vpm[s]=0);
  data.forEach(c=>c.months.forEach(m=>{if(m.vence_min>0&&meses.includes(m.sort))vpm[m.sort]=(vpm[m.sort]||0)+m.vence_min;}));

  const totalV=Object.values(vpm).reduce((a,b)=>a+b,0);
  const comV=data.filter(c=>c.months.some(m=>m.vence_min>0)).length;
  const picoMes=ALL_MONTHS.filter(s=>meses.includes(s)).reduce((a,b)=>vpm[b]>vpm[a]?b:a,ALL_MONTHS[0]);
  const totalA=data.reduce((s,c)=>s+(c.months.filter(m=>!m.projecao).at(-1)?.acum_min||0),0);

  const top=[...data].map(c=>({
    name:c.name,
    total:c.months.filter(m=>meses.includes(m.sort)).reduce((s,m)=>s+m.vence_min,0),
    acum:c.months.filter(m=>!m.projecao).at(-1)?.acum_min||0
  })).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
  const maxV=Math.max(...top.map(x=>x.total),1);

  const labelsChart=ALL_MONTHS.filter(s=>meses.includes(s)).map(s=>MONTH_LABELS[s]);
  const vH=ALL_MONTHS.filter(s=>meses.includes(s)).map(s=>+(vpm[s]/60).toFixed(1));
  const bgColors=ALL_MONTHS.filter(s=>meses.includes(s)).map(s=>PROJ_MONTHS.has(s)?'rgba(43,43,230,0.35)':C_AZUL);

  document.getElementById('tab-visao-geral').innerHTML=`
    <div class="nota-proj">
      ● Meses com dados reais &nbsp;|&nbsp; ◆ Meses com projeção de vencimento (calculado via FIFO com dados já importados)
    </div>
    <div class="cards">
      <div class="card"><div class="card-label">Total projetado a vencer</div><div class="card-value warn">${fmt(totalV)}</div></div>
      <div class="card"><div class="card-label">Colaboradores afetados</div><div class="card-value">${comV} de ${data.length}</div></div>
      <div class="card"><div class="card-label">Mês de maior vencimento</div><div class="card-value warn">${totalV>0?MONTH_LABELS[picoMes]||'—':'Nenhum'}</div></div>
      <div class="card"><div class="card-label">Saldo acumulado atual</div><div class="card-value ok">${fmt(totalA)}</div></div>
    </div>
    <div class="chart-box">
      <div class="section-hdr">Horas a vencer por mês (projeção FIFO)</div>
      <div class="chart-inner">
        <div class="legend">
          <span class="legend-item"><span class="legend-sq" style="background:${C_AZUL}"></span>Vencimento confirmado</span>
          <span class="legend-item"><span class="legend-sq" style="background:rgba(43,43,230,0.35);border:1px dashed #3C3489"></span>Projeção futura</span>
        </div>
        <div style="position:relative;height:240px"><canvas id="chart-geral"></canvas></div>
      </div>
    </div>
    ${top.length>0?`
    <div class="section-hdr">Ranking — maiores saldos a vencer</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Colaborador</th><th>Total a vencer</th><th>Distribuição</th><th>Saldo acum. atual</th></tr></thead>
      <tbody>${top.slice(0,20).map(x=>`<tr>
        <td style="font-weight:700">${x.name}</td>
        <td><span class="pill ${x.total>300?'pill-danger':'pill-warn'}">${fmt(x.total)}</span></td>
        <td><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(x.total/maxV*100)}%;background:${C_AZUL}"></div></div></div></td>
        <td style="color:var(--azul-med);font-weight:500">${fmt(x.acum)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`:'<div class="no-data">Nenhum vencimento no período selecionado</div>'}`;

  if(cGeral)cGeral.destroy();
  cGeral=new Chart(document.getElementById('chart-geral'),{
    type:'bar',
    data:{labels:labelsChart,datasets:[{
      label:'Horas a vencer',data:vH,
      backgroundColor:bgColors,
      borderColor:ALL_MONTHS.filter(s=>meses.includes(s)).map(s=>PROJ_MONTHS.has(s)?'#3C3489':C_AZUL),
      borderWidth:ALL_MONTHS.filter(s=>meses.includes(s)).map(s=>PROJ_MONTHS.has(s)?1.5:0),
      borderDash:ALL_MONTHS.filter(s=>meses.includes(s)).map(s=>PROJ_MONTHS.has(s)?[4,3]:[]),
      borderRadius:0,
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{
        label:ctx=>{
          const s=ALL_MONTHS.filter(x=>meses.includes(x))[ctx.dataIndex];
          const tag=PROJ_MONTHS.has(s)?'(projeção)':'(confirmado)';
          return ` ${ctx.raw}h ${tag}`;
        }
      }}},
      scales:{
        x:{ticks:{autoSkip:false,maxRotation:45,font:{size:10,family:'Red Hat Display'}},grid:{display:false}},
        y:{ticks:{callback:v=>v+'h',font:{size:10,family:'Red Hat Display'}},grid:{color:'rgba(43,43,230,0.07)'}}
      }
    }
  });
}

function renderPorColaborador(data){
  const mes=document.getElementById('mes-filter').value;
  const meses=mes?[mes]:getMesesFiltrados();
  const rows=data.map(c=>{
    const tv=c.months.filter(m=>meses.includes(m.sort)).reduce((s,m)=>s+m.vence_min,0);
    const la=c.months.filter(m=>!m.projecao).at(-1)?.acum_min||0;
    return`<tr>
      <td style="font-weight:700;color:var(--azul-forte)">${c.name}</td>
      <td><span class="pill ${tv>300?'pill-danger':tv>0?'pill-warn':'pill-none'}">${fmt(tv)||'—'}</span></td>
      ${meses.map(s=>{
        const m=c.months.find(x=>x.sort===s);
        const v=m?m.vence_min:0;
        const isProj=PROJ_MONTHS.has(s);
        const cls=isProj?'pill-proj':v>300?'pill-danger':'pill-warn';
        return`<td style="text-align:center${isProj?';background:rgba(238,237,254,0.4)':''}">${v>0?`<span class="pill ${cls}">${fmt(v)}</span>`:'<span style="color:var(--borda)">—</span>'}</td>`;
      }).join('')}
      <td style="color:var(--azul-med);font-weight:500">${fmt(la)}</td>
    </tr>`;
  }).join('');

  document.getElementById('tab-por-colaborador').innerHTML=`
    <div class="nota-proj">● Dados reais &nbsp;|&nbsp; ◆ Projeção — colunas com fundo lilás são meses futuros calculados via FIFO</div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th style="min-width:180px">Colaborador</th>
        <th>Total a vencer</th>
        ${meses.map(s=>`<th style="text-align:center${PROJ_MONTHS.has(s)?';background:rgba(21,21,184,0.85)':''}">${MONTH_LABELS[s]}${PROJ_MONTHS.has(s)?' ◆':''}</th>`).join('')}
        <th>Saldo acum.</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

  const vpm={};ALL_MONTHS.forEach(s=>vpm[s]=0);
  data.forEach(c=>c.months.forEach(m=>{if(m.vence_min>0)vpm[m.sort]=(vpm[m.sort]||0)+m.vence_min;}));
  let acc=0;
  const sortedMeses=ALL_MONTHS.filter(s=>meses.includes(s));
  const cumul=sortedMeses.map(s=>{acc+=vpm[s];return +(acc/60).toFixed(1);});
  const bgLine=sortedMeses.map(s=>PROJ_MONTHS.has(s)?C_ROXO:C_AMARELO);

  let rows='';
  meses.forEach(s=>{
    const lista=data.filter(c=>c.months.some(m=>m.sort===s&&m.vence_min>0));
    if(!lista.length)return;
    const tot=lista.reduce((sum,c)=>{const m=c.months.find(x=>x.sort===s);return sum+(m?m.vence_min:0);},0);
    const isProj=PROJ_MONTHS.has(s);
    rows+=`<tr class="month-row"><td colspan="3">
      ${MONTH_LABELS[s]}${isProj?' <span class="badge-proj">projeção</span>':''}
      — <span style="color:var(--azul-forte)">${fmt(tot)} a vencer</span>
    </td></tr>`;
    lista.forEach(c=>{
      const mi=c.months.findIndex(x=>x.sort===s);
      const m=c.months[mi];
      // Mostrar origens se disponível
      let origemTxt='';
      if(m.origens&&m.origens.length>0){
        origemTxt=m.origens.map(o=>`${o.mes}: ${fmt(o.valor)}`).join(' + ');
      } else {
        const orig=mi>=6?c.months.filter(x=>!x.projecao)[mi-6]?.label:null;
        if(orig)origemTxt=`crédito de ${orig}`;
      }
      rows+=`<tr>
        <td class="indent" style="font-weight:500">${c.name}</td>
        <td><span class="pill ${m.vence_min>300?'pill-danger':isProj?'pill-proj':'pill-warn'}">${fmt(m.vence_min)}</span></td>
        <td style="color:var(--texto2);font-size:11px">${origemTxt}</td>
      </tr>`;
    });
  });

  document.getElementById('tab-timeline').innerHTML=`
    <div class="nota-proj">Os vencimentos futuros são calculados com os dados já importados. Atualizam automaticamente a cada novo relatório importado.</div>
    <div class="chart-box">
      <div class="section-hdr">Horas a vencer — acumulado (histórico + projeção)</div>
      <div class="chart-inner">
        <div style="position:relative;height:230px"><canvas id="chart-timeline"></canvas></div>
      </div>
    </div>
    <div class="section-hdr">Detalhe por mês e colaborador</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Colaborador</th><th>Horas a vencer</th><th>Origem do crédito (FIFO)</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="3" class="no-data">Nenhum vencimento no período selecionado</td></tr>'}</tbody>
    </table></div>`;

  if(cTimeline)cTimeline.destroy();
  cTimeline=new Chart(document.getElementById('chart-timeline'),{
    type:'line',
    data:{labels:sortedMeses.map(s=>MONTH_LABELS[s]),datasets:[{
      label:'Acumulado',data:cumul,
      borderColor:C_AZUL,backgroundColor:'rgba(43,43,230,0.06)',
      fill:true,tension:0.3,borderWidth:2,
      pointRadius:5,
      pointBackgroundColor:bgLine,
      pointBorderColor:C_AZUL,pointBorderWidth:1.5
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{
        label:ctx=>{
          const s=sortedMeses[ctx.dataIndex];
          return ` ${ctx.raw}h acumulado ${PROJ_MONTHS.has(s)?'(projeção)':''}`;
        }
      }}},
      scales:{
        x:{ticks:{autoSkip:false,maxRotation:45,font:{size:10,family:'Red Hat Display'}},grid:{display:false}},
        y:{ticks:{callback:v=>v+'h',font:{size:10,family:'Red Hat Display'}},grid:{color:'rgba(43,43,230,0.07)'}}
      }
    }
  });
}

function render(){
  const d=getFiltered();
  if(activeTab==='visao-geral')renderVisaoGeral(d);
  else if(activeTab==='por-colaborador')renderPorColaborador(d);
  else renderTimeline(d);
}
render();
</script>
</body>
</html>
