<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Banco de Horas — Gummy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --azul-forte:#2B2BE6;--azul-escuro:#1515B8;--azul-claro:#EEF0FF;
  --azul-secao:#E6F1FB;--roxo-sutil:#EEEDFE;--amarelo:#E8FF00;
  --creme:#FAFAF2;--cinza:#F7F7F7;--branco:#FFFFFF;
  --texto:#1A1A1A;--texto2:#888888;--azul-med:#3C3489;--borda:#CCCCCC;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Red Hat Display',sans-serif;background:var(--cinza);color:var(--texto);font-size:14px;line-height:1.5}
.app{max-width:1280px;margin:0 auto;padding:24px 16px}
.header{background:var(--azul-forte);padding:20px 24px 14px}
.header h1{font-size:18px;font-weight:700;color:var(--amarelo)}
.header-sub{background:var(--amarelo);padding:6px 24px;font-size:11px;font-weight:600;color:var(--texto);letter-spacing:.04em;text-transform:uppercase}
.atualizado{font-size:10px;color:rgba(232,255,0,.7);margin-top:4px}
.badge{background:var(--amarelo);color:var(--azul-escuro);font-size:10px;font-weight:700;padding:2px 8px;letter-spacing:.04em;text-transform:uppercase;margin-left:10px;vertical-align:middle}
.toolbar{background:var(--branco);border-bottom:1px solid var(--borda);padding:10px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{height:32px;padding:0 10px;border:1px solid var(--borda);font-family:'Red Hat Display',sans-serif;font-size:12px;color:var(--texto);background:var(--creme);outline:none}
.toolbar input:focus,.toolbar select:focus{border-color:var(--azul-forte)}
.tabs{background:var(--branco);border-bottom:2px solid var(--azul-forte);padding:0 24px;display:flex}
.tab{padding:10px 20px;font-size:12px;font-weight:500;font-family:'Red Hat Display',sans-serif;border:none;background:none;color:var(--texto2);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;letter-spacing:.02em}
.tab.active{color:var(--azul-forte);border-bottom-color:var(--azul-forte);font-weight:700}
.tab:hover:not(.active){color:var(--texto);background:var(--azul-claro)}
.content{padding:20px 0}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;margin-bottom:20px;border:1px solid var(--borda);background:var(--borda)}
.card{background:var(--branco);padding:14px 18px}
.card-label{font-size:10px;font-weight:700;color:var(--texto2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.card-value{font-size:22px;font-weight:700;color:var(--texto)}
.card-value.azul{color:var(--azul-forte)}
.card-value.vermelho{color:#DC2626}
.card-value.ok{color:#16A34A}
.section-hdr{background:var(--azul-secao);color:#0C447C;font-size:11px;font-weight:700;padding:8px 16px;letter-spacing:.04em;text-transform:uppercase;border-left:3px solid var(--azul-forte);margin-bottom:0}
.chart-box{background:var(--branco);border:1px solid var(--borda);margin-bottom:16px}
.chart-inner{padding:16px 20px}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--texto2)}
.legend-sq{width:10px;height:10px;border-radius:1px;flex-shrink:0}
.table-wrap{overflow-x:auto;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--azul-escuro);color:var(--branco);font-size:10px;font-weight:700;text-align:left;padding:8px 12px;white-space:nowrap;letter-spacing:.04em;text-transform:uppercase}
thead th.th-passado{background:#92400E}
thead th.th-atual{background:#1515B8}
thead th.th-futuro{background:#3C3489}
tbody td{padding:8px 12px;border-bottom:1px solid var(--borda);vertical-align:middle}
tbody tr:nth-child(even) td{background:var(--azul-claro)}
tbody tr:nth-child(odd) td{background:var(--branco)}
tbody tr:hover td{background:var(--roxo-sutil)}
.pill{display:inline-block;padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:.03em;white-space:nowrap}
.pill-azul{background:var(--amarelo);color:var(--azul-escuro)}
.pill-passado{background:#FEF3C7;color:#92400E;border:1px solid #F59E0B}
.pill-vencido{background:#FEE2E2;color:#7F1D1D;border:1px solid #EF4444}
.pill-none{background:var(--cinza);color:var(--texto2)}
.bar-wrap{display:flex;align-items:center;gap:8px}
.bar-bg{height:6px;flex:1;min-width:60px;background:var(--azul-claro);display:flex}
.bar-fill{height:100%}
.month-row-passado td{background:#FEF3C7!important;color:#92400E;font-weight:700;font-size:12px;padding:8px 12px;border-left:3px solid #F59E0B}
.month-row-futuro td{background:var(--roxo-sutil)!important;color:var(--azul-med);font-weight:700;font-size:12px;padding:8px 12px;border-left:3px solid var(--azul-forte)}
.no-data{text-align:center;padding:32px;color:var(--texto2);font-size:13px}
.indent{padding-left:28px!important}
.nota{font-size:11px;padding:8px 16px;margin-bottom:16px;border-left:3px solid}
.nota-laranja{background:#FEF3C7;color:#92400E;border-color:#F59E0B}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div style="display:flex;align-items:center">
      <h1>Banco de Horas <span class="badge">FIFO</span></h1>
    </div>
    <div class="atualizado" id="atualizado"></div>
  </div>
  <div class="header-sub">Gummy Conteúdo Inteligente &nbsp;·&nbsp; Histórico completo + projeção até Dez/2027</div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Buscar colaborador..." style="width:200px">
    <select id="mes-filter"><option value="">Todos os meses</option></select>
    <select id="tipo-filter">
      <option value="todos">Passados + Futuros</option>
      <option value="passado">Só vencidos (passados)</option>
      <option value="futuro">Só a vencer (futuros)</option>
    </select>
    <select id="sort-by">
      <option value="nome">Ordenar por nome</option>
      <option value="vence-desc">Maior saldo a vencer</option>
      <option value="acum-desc">Maior saldo acumulado</option>
    </select>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="visao-geral">Visão geral</button>
    <button class="tab" data-tab="por-colaborador">Por colaborador</button>
    <button class="tab" data-tab="timeline">Timeline</button>
  </div>

  <div class="content">
    <div id="tab-visao-geral"></div>
    <div id="tab-por-colaborador" style="display:none"></div>
    <div id="tab-timeline" style="display:none"></div>
  </div>
</div>

, "extras_min": 0, "comp_min": 0, "saldo_min": 0, "acum_min": 716, "vence_min": 0, "projecao": true, "passado": false, "origens": []}, {"label": "Abr/2027", "sort": "2027-04", "extras_min": 0, "comp_min": 0, "saldo_min": 0, "acum_min": 716, "vence_min": 0, "projecao": true, "passado": false, "origens": []}, {"label": "Mai/2027", "sort": "2027-05", "extras_min": 0, "comp_min": 0, "saldo_min": 0, "acum_min": 716, "vence_min": 0, "projecao": true, "passado": false, "origens": []}, {"label": "Jun/2027", "sort": "2027-06", "extras_min": 0, "comp_min": 0, "saldo_min": 0, "acum_min": 716, "vence_min": 0, "projecao": true, "passado": false, "origens": []}, {"label": "Jul/2027", "sort": "2027-07", "extras_min": 0, "comp_min": 0, "saldo_min": 0, "acum_min": 716, "vence_min": 0, "projecao": true, "passado": false, "origens": []}, {"label": "Ago/2027", "sort": "2027-08", "extras_min": 0, "comp_min": 0, "saldo_min": 0, "acum_min": 716, "vence_min": 0, "projecao": true, "passado": false, "origens": []}, {"label": "Set/2027", "sort": "2027-09", "extras_min": 0, "comp_min": 0, "saldo_min": 0, "acum_min": 716, "vence_min": 0, "projecao": true, "passado": false, "origens": []}, {"label": "Out/2027", "sort": "2027-10", "extras_min": 0, "comp_min": 0, "saldo_min": 0, "acum_min": 716, "vence_min": 0, "projecao": true, "passado": false, "origens": []}, {"label": "Nov/2027", "sort": "2027-11", "extras_min": 0, "comp_min": 0, "saldo_min": 0, "acum_min": 716, "vence_min": 0, "projecao": true, "passado": false, "origens": []}, {"label": "Dez/2027", "sort": "2027-12", "extras_min": 0, "comp_min": 0, "saldo_min": 0, "acum_min": 716, "vence_min": 0, "projecao": true, "passado": false, "origens": []}]}];
const MES_ATUAL = '2026-06';
document.getElementById('atualizado').textContent = 'Atualizado em 03/06/2026 às 22:05';

const ALL_MONTHS=[...new Set(DATA.flatMap(c=>c.months.map(m=>m.sort)))].sort();
const MONTH_LABELS={};
DATA.forEach(c=>c.months.forEach(m=>{MONTH_LABELS[m.sort]=m.label;}));

const sel=document.getElementById('mes-filter');
ALL_MONTHS.forEach(s=>{
  const o=document.createElement('option');o.value=s;
  const tag=s<MES_ATUAL?' ⏰':s===MES_ATUAL?' ◉':' ◆';
  o.textContent=MONTH_LABELS[s]+tag;sel.appendChild(o);
});

let activeTab='visao-geral',cGeral=null,cTimeline=null;

function fmt(min){
  if(!min&&min!==0)return'—';if(min===0)return'—';
  const h=Math.floor(Math.abs(min)/60),m=Math.abs(min)%60,sg=min<0?'-':'';
  return sg+h+'h'+(m>0?String(m).padStart(2,'0'):'');
}
function ehPassado(s){return s<MES_ATUAL;}
function ehAtual(s){return s===MES_ATUAL;}
function getMesesFiltrados(){
  const t=document.getElementById('tipo-filter').value;
  if(t==='passado') return ALL_MONTHS.filter(s=>s<=MES_ATUAL);
  if(t==='futuro')  return ALL_MONTHS.filter(s=>s>=MES_ATUAL);
  return ALL_MONTHS;
}
function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const so=document.getElementById('sort-by').value;
  let d=DATA.filter(c=>!q||c.name.toLowerCase().includes(q));
  if(so==='vence-desc') d=[...d].sort((a,b)=>b.months.reduce((s,m)=>s+m.vence_min,0)-a.months.reduce((s,m)=>s+m.vence_min,0));
  else if(so==='acum-desc') d=[...d].sort((a,b)=>(b.months.filter(m=>!m.projecao).at(-1)?.acum_min||0)-(a.months.filter(m=>!m.projecao).at(-1)?.acum_min||0));
  return d;
}
function switchTab(t){
  activeTab=t;
  ['visao-geral','por-colaborador','timeline'].forEach(x=>document.getElementById('tab-'+x).style.display=x===t?'':'none');
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));
  render();
}
document.querySelectorAll('.tab').forEach(el=>el.addEventListener('click',()=>switchTab(el.dataset.tab)));
['search','mes-filter','tipo-filter','sort-by'].forEach(id=>document.getElementById(id).addEventListener('change',render));
document.getElementById('search').addEventListener('input',render);

const C_AZUL='#2B2BE6',C_AMARELO='#E8FF00';

function renderVisaoGeral(data){
  const meses=getMesesFiltrados();
  let tPass=0,tFut=0;
  const vpm={};ALL_MONTHS.forEach(s=>vpm[s]=0);
  data.forEach(c=>c.months.forEach(m=>{
    if(m.vence_min>0){
      vpm[m.sort]=(vpm[m.sort]||0)+m.vence_min;
      if(ehPassado(m.sort))tPass+=m.vence_min; else tFut+=m.vence_min;
    }
  }));
  const comV=data.filter(c=>c.months.some(m=>m.vence_min>0&&meses.includes(m.sort))).length;
  const mF=ALL_MONTHS.filter(s=>meses.includes(s));
  const pico=mF.reduce((a,b)=>vpm[b]>vpm[a]?b:a,mF[0]||ALL_MONTHS[0]);
  const totalAcum=data.reduce((s,c)=>s+(c.months.filter(m=>!m.projecao).at(-1)?.acum_min||0),0);
  const top=[...data].map(c=>({
    name:c.name,
    total:c.months.filter(m=>meses.includes(m.sort)).reduce((s,m)=>s+m.vence_min,0),
    passado:c.months.filter(m=>meses.includes(m.sort)&&ehPassado(m.sort)).reduce((s,m)=>s+m.vence_min,0),
    acum:c.months.filter(m=>!m.projecao).at(-1)?.acum_min||0
  })).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
  const maxV=Math.max(...top.map(x=>x.total),1);
  const lC=mF.map(s=>MONTH_LABELS[s]);
  const vP=mF.map(s=>ehPassado(s)?+(vpm[s]/60).toFixed(1):0);
  const vF=mF.map(s=>!ehPassado(s)?+(vpm[s]/60).toFixed(1):0);

  document.getElementById('tab-visao-geral').innerHTML=`
    <div class="nota nota-laranja">⏰ Meses passados = horas que <strong>já venceram</strong> e precisam ser pagas ou compensadas &nbsp;|&nbsp; ◆ Meses futuros = projeção FIFO</div>
    <div class="cards">
      <div class="card"><div class="card-label">Total vencido (passado)</div><div class="card-value vermelho">${fmt(tPass)}</div></div>
      <div class="card"><div class="card-label">Total a vencer (futuro)</div><div class="card-value azul">${fmt(tFut)}</div></div>
      <div class="card"><div class="card-label">Total geral</div><div class="card-value">${fmt(tPass+tFut)}</div></div>
      <div class="card"><div class="card-label">Colaboradores afetados</div><div class="card-value">${comV}</div></div>
      <div class="card"><div class="card-label">Saldo acumulado total</div><div class="card-value ok">${fmt(totalAcum)}</div></div>
    </div>
    <div class="chart-box">
      <div class="section-hdr">Horas vencidas e a vencer por mês</div>
      <div class="chart-inner">
        <div class="legend">
          <span class="legend-item"><span class="legend-sq" style="background:#DC2626"></span>Já venceu</span>
          <span class="legend-item"><span class="legend-sq" style="background:${C_AZUL}"></span>A vencer</span>
        </div>
        <div style="position:relative;height:240px"><canvas id="chart-geral"></canvas></div>
      </div>
    </div>
    ${top.length>0?`
    <div class="section-hdr">Ranking — maiores saldos</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Colaborador</th><th>Total</th><th>Vencido</th><th>A vencer</th><th>Distribuição</th><th>Saldo acum.</th></tr></thead>
      <tbody>${top.slice(0,20).map(x=>`<tr>
        <td style="font-weight:700">${x.name}</td>
        <td style="font-weight:700">${fmt(x.total)}</td>
        <td style="color:#DC2626">${fmt(x.passado)||'—'}</td>
        <td style="color:var(--azul-forte)">${fmt(x.total-x.passado)||'—'}</td>
        <td><div class="bar-wrap"><div class="bar-bg">
          <div class="bar-fill" style="width:${Math.round(x.passado/maxV*100)}%;background:#DC2626"></div>
          <div class="bar-fill" style="width:${Math.round((x.total-x.passado)/maxV*100)}%;background:${C_AZUL}"></div>
        </div></div></td>
        <td style="color:var(--azul-med);font-weight:500">${fmt(x.acum)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`:''}`;

  if(cGeral)cGeral.destroy();
  cGeral=new Chart(document.getElementById('chart-geral'),{type:'bar',
    data:{labels:lC,datasets:[
      {label:'Vencido',data:vP,backgroundColor:'#DC2626',stack:'s'},
      {label:'A vencer',data:vF,backgroundColor:C_AZUL,stack:'s'},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{autoSkip:false,maxRotation:45,font:{size:10,family:'Red Hat Display'}},grid:{display:false},stacked:true},
        y:{ticks:{callback:v=>v+'h',font:{size:10,family:'Red Hat Display'}},grid:{color:'rgba(43,43,230,0.07)'},stacked:true}
      }
    }
  });
}

function renderPorColaborador(data){
  const mes=document.getElementById('mes-filter').value;
  const meses=mes?[mes]:getMesesFiltrados();
  const rows=data.map(c=>{
    const tv=c.months.filter(m=>meses.includes(m.sort)).reduce((s,m)=>s+m.vence_min,0);
    const tp=c.months.filter(m=>meses.includes(m.sort)&&ehPassado(m.sort)).reduce((s,m)=>s+m.vence_min,0);
    const la=c.months.filter(m=>!m.projecao).at(-1)?.acum_min||0;
    return`<tr>
      <td style="font-weight:700;color:var(--azul-forte)">${c.name}</td>
      <td>${tp>0?`<span class="pill pill-vencido">${fmt(tp)}</span>`:'<span style="color:var(--borda)">—</span>'}</td>
      <td>${(tv-tp)>0?`<span class="pill pill-azul">${fmt(tv-tp)}</span>`:'<span style="color:var(--borda)">—</span>'}</td>
      ${meses.map(s=>{
        const m=c.months.find(x=>x.sort===s);const v=m?m.vence_min:0;
        const past=ehPassado(s);
        const cls=past?'pill-vencido':'pill-azul';
        return`<td style="text-align:center${past?';background:rgba(254,243,199,0.4)':''}">${v>0?`<span class="pill ${cls}">${fmt(v)}</span>`:'<span style="color:var(--borda)">—</span>'}</td>`;
      }).join('')}
      <td style="color:var(--azul-med);font-weight:500">${fmt(la)}</td>
    </tr>`;
  }).join('');
  document.getElementById('tab-por-colaborador').innerHTML=`
    <div class="nota nota-laranja">⏰ Fundo amarelo = meses vencidos &nbsp;|&nbsp; ◆ Branco = futuros</div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th style="min-width:180px">Colaborador</th><th>Vencido</th><th>A vencer</th>
        ${meses.map(s=>`<th class="${ehPassado(s)?'th-passado':ehAtual(s)?'th-atual':'th-futuro'}" style="text-align:center">${MONTH_LABELS[s]}${ehPassado(s)?' ⏰':ehAtual(s)?' ◉':' ◆'}</th>`).join('')}
        <th>Saldo acum.</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function renderTimeline(data){
  const meses=getMesesFiltrados();
  const vpm={};ALL_MONTHS.forEach(s=>vpm[s]=0);
  data.forEach(c=>c.months.forEach(m=>{if(m.vence_min>0)vpm[m.sort]=(vpm[m.sort]||0)+m.vence_min;}));
  const sM=ALL_MONTHS.filter(s=>meses.includes(s));
  let aP=0,aF=0;
  const cP=sM.map(s=>{if(ehPassado(s))aP+=vpm[s];return+(aP/60).toFixed(1);});
  const cF=sM.map(s=>{if(!ehPassado(s))aF+=vpm[s];return+(aF/60).toFixed(1);});
  let rows='';
  sM.forEach(s=>{
    const lista=data.filter(c=>c.months.some(m=>m.sort===s&&m.vence_min>0));
    if(!lista.length)return;
    const tot=lista.reduce((sum,c)=>{const m=c.months.find(x=>x.sort===s);return sum+(m?m.vence_min:0);},0);
    const past=ehPassado(s);
    rows+=`<tr class="${past?'month-row-passado':'month-row-futuro'}"><td colspan="3">${MONTH_LABELS[s]} ${past?'⏰ JÁ VENCEU':'◆ PROJEÇÃO'} — <strong>${fmt(tot)}</strong></td></tr>`;
    lista.forEach(c=>{
      const m=c.months.find(x=>x.sort===s);if(!m||!m.vence_min)return;
      const orig=(m.origens||[]).map(o=>`${o.mes}: ${fmt(o.valor)}`).join(' + ');
      rows+=`<tr><td class="indent" style="font-weight:500">${c.name}</td>
        <td><span class="pill ${past?'pill-vencido':'pill-azul'}">${fmt(m.vence_min)}</span></td>
        <td style="color:var(--texto2);font-size:11px">${orig||'—'}</td></tr>`;
    });
  });
  document.getElementById('tab-timeline').innerHTML=`
    <div class="chart-box">
      <div class="section-hdr">Acumulado vencido × a vencer</div>
      <div class="chart-inner">
        <div class="legend">
          <span class="legend-item"><span class="legend-sq" style="background:#DC2626"></span>Acumulado vencido</span>
          <span class="legend-item"><span class="legend-sq" style="background:${C_AZUL}"></span>Acumulado a vencer</span>
        </div>
        <div style="position:relative;height:230px"><canvas id="chart-timeline"></canvas></div>
      </div>
    </div>
    <div class="section-hdr">Detalhe por mês — origem do crédito (FIFO)</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Colaborador</th><th>Horas</th><th>Origem do crédito</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="3" class="no-data">Nenhum vencimento no período</td></tr>'}</tbody>
    </table></div>`;
  if(cTimeline)cTimeline.destroy();
  cTimeline=new Chart(document.getElementById('chart-timeline'),{type:'line',
    data:{labels:sM.map(s=>MONTH_LABELS[s]),datasets:[
      {label:'Vencido',data:cP,borderColor:'#DC2626',backgroundColor:'rgba(220,38,38,0.07)',fill:true,tension:0.3,borderWidth:2,pointRadius:3,pointBackgroundColor:'#DC2626'},
      {label:'A vencer',data:cF,borderColor:C_AZUL,backgroundColor:'rgba(43,43,230,0.06)',fill:true,tension:0.3,borderWidth:2,pointRadius:3,pointBackgroundColor:C_AMARELO,pointBorderColor:C_AZUL,pointBorderWidth:1.5}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{autoSkip:false,maxRotation:45,font:{size:10,family:'Red Hat Display'}},grid:{display:false}},
        y:{ticks:{callback:v=>v+'h',font:{size:10,family:'Red Hat Display'}},grid:{color:'rgba(43,43,230,0.07)'}}
      }
    }
  });
}

function render(){
  const d=getFiltered();
  if(activeTab==='visao-geral')renderVisaoGeral(d);
  else if(activeTab==='por-colaborador')renderPorColaborador(d);
  else renderTimeline(d);
}
render();
</script>
