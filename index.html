<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Banco de Horas — Gummy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ── Gummy Design System ─────────────────────────────────── */
:root {
  --azul-forte:  #2B2BE6;
  --azul-escuro: #1515B8;
  --azul-claro:  #EEF0FF;
  --azul-secao:  #E6F1FB;
  --roxo-sutil:  #EEEDFE;
  --amarelo:     #E8FF00;
  --creme:       #FAFAF2;
  --cinza-claro: #F7F7F7;
  --branco:      #FFFFFF;
  --texto:       #1A1A1A;
  --texto2:      #888888;
  --azul-txt:    #2B2BE6;
  --azul-esc-f:  #0C447C;
  --azul-med-f:  #3C3489;
  --borda:       #CCCCCC;
  --warn-bg:     #FEF3C7;
  --warn-txt:    #92400E;
  --danger-bg:   #FEE2E2;
  --danger-txt:  #7F1D1D;
  --ok-bg:       #DCFCE7;
  --ok-txt:      #14532D;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Red Hat Display', sans-serif;
  background: var(--cinza-claro);
  color: var(--texto);
  font-size: 14px;
  line-height: 1.5;
}
/* ── Layout ──────────────────────────────────────────────── */
.app { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
/* ── Header ──────────────────────────────────────────────── */
.header {
  background: var(--azul-forte);
  padding: 20px 24px 16px;
  margin-bottom: 0;
}
.header-top { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.header h1 {
  font-size: 18px; font-weight: 700;
  color: var(--amarelo); letter-spacing: .01em;
}
.header-sub {
  background: var(--amarelo);
  padding: 6px 24px;
  font-size: 11px; font-weight: 500;
  color: var(--texto);
  letter-spacing: .03em;
}
.badge-fifo {
  background: var(--amarelo);
  color: var(--azul-escuro);
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 2px;
  letter-spacing: .04em; text-transform: uppercase;
}
.atualizado { font-size: 10px; color: rgba(232,255,0,.7); margin-top: 4px; }
/* ── Toolbar ──────────────────────────────────────────────── */
.toolbar {
  background: var(--branco);
  border-bottom: 1px solid var(--borda);
  padding: 12px 24px;
  display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
}
.toolbar input, .toolbar select {
  height: 32px; padding: 0 10px;
  border: 1px solid var(--borda);
  font-family: 'Red Hat Display', sans-serif;
  font-size: 12px; color: var(--texto);
  background: var(--creme); outline: none;
}
.toolbar input:focus, .toolbar select:focus {
  border-color: var(--azul-forte);
}
/* ── Tabs ──────────────────────────────────────────────────── */
.tabs {
  background: var(--branco);
  border-bottom: 2px solid var(--azul-forte);
  padding: 0 24px;
  display: flex; gap: 0;
}
.tab {
  padding: 10px 20px; font-size: 12px; font-weight: 500;
  font-family: 'Red Hat Display', sans-serif;
  border: none; background: none;
  color: var(--texto2); cursor: pointer;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  letter-spacing: .02em;
}
.tab.active {
  color: var(--azul-forte); border-bottom-color: var(--azul-forte);
  font-weight: 700;
}
.tab:hover:not(.active) { color: var(--texto); background: var(--azul-claro); }
/* ── Content ───────────────────────────────────────────────── */
.content { padding: 20px 0; }
/* ── Metric cards ──────────────────────────────────────────── */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 1px; margin-bottom: 20px;
  border: 1px solid var(--borda);
  background: var(--borda);
}
.card {
  background: var(--branco);
  padding: 16px 20px;
}
.card-label {
  font-size: 10px; font-weight: 700; color: var(--texto2);
  text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px;
}
.card-value { font-size: 24px; font-weight: 700; color: var(--texto); }
.card-value.warn  { color: var(--azul-forte); }
.card-value.alert { color: #DC2626; }
.card-value.ok    { color: #16A34A; }
/* ── Section header (like Excel's section header) ─────────── */
.section-hdr {
  background: var(--azul-secao);
  color: var(--azul-esc-f);
  font-size: 11px; font-weight: 700;
  padding: 8px 16px;
  letter-spacing: .04em; text-transform: uppercase;
  border-left: 3px solid var(--azul-forte);
  margin-bottom: 0;
}
/* ── Chart box ─────────────────────────────────────────────── */
.chart-box {
  background: var(--branco);
  border: 1px solid var(--borda);
  margin-bottom: 16px;
}
.chart-inner { padding: 16px 20px; }
.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--texto2); }
.legend-sq { width: 10px; height: 10px; border-radius: 1px; flex-shrink: 0; }
/* ── Table ─────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; margin-bottom: 16px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th {
  background: var(--azul-escuro);
  color: var(--branco);
  font-size: 10px; font-weight: 700;
  text-align: left; padding: 8px 12px;
  white-space: nowrap; letter-spacing: .04em; text-transform: uppercase;
}
tbody td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--borda);
  vertical-align: middle;
}
tbody tr:nth-child(even) td { background: var(--azul-claro); }
tbody tr:nth-child(odd)  td { background: var(--branco); }
tbody tr:hover td { background: var(--roxo-sutil); }
/* ── Pills ─────────────────────────────────────────────────── */
.pill {
  display: inline-block; padding: 2px 8px;
  font-size: 10px; font-weight: 700;
  letter-spacing: .03em; white-space: nowrap;
}
.pill-warn   { background: var(--amarelo); color: var(--azul-escuro); }
.pill-danger { background: var(--azul-forte); color: var(--amarelo); }
.pill-none   { background: var(--cinza-claro); color: var(--texto2); }
/* ── Bar ───────────────────────────────────────────────────── */
.bar-wrap { display: flex; align-items: center; gap: 8px; }
.bar-bg   { height: 6px; flex: 1; min-width: 60px; background: var(--azul-claro); }
.bar-fill { height: 100%; }
/* ── Month group row ───────────────────────────────────────── */
.month-row td {
  background: var(--roxo-sutil) !important;
  color: var(--azul-med-f);
  font-weight: 700; font-size: 12px;
  padding: 8px 12px;
}
.month-row td .alert { color: var(--azul-forte); }
.no-data { text-align: center; padding: 32px; color: var(--texto2); font-size: 13px; }
.indent { padding-left: 28px !important; }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <h1>Banco de Horas</h1>
      <span class="badge-fifo">FIFO</span>
    </div>
    <div class="atualizado" id="atualizado"></div>
  </div>
  <div class="header-sub">GUMMY CONTEÚDO INTELIGENTE &nbsp;·&nbsp; SALDO A VENCER POR COLABORADOR E MÊS</div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input type="text" id="search" placeholder="Buscar colaborador..." style="width:200px">
    <select id="mes-filter"><option value="">Todos os meses</option></select>
    <select id="sort-by">
      <option value="nome">Ordenar por nome</option>
      <option value="vence-desc">Maior saldo a vencer</option>
      <option value="acum-desc">Maior saldo acumulado</option>
    </select>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="visao-geral">Visão geral</button>
    <button class="tab" data-tab="por-colaborador">Por colaborador</button>
    <button class="tab" data-tab="timeline">Timeline</button>
  </div>

  <div class="content">
    <div id="tab-visao-geral"></div>
    <div id="tab-por-colaborador" style="display:none"></div>
    <div id="tab-timeline" style="display:none"></div>
  </div>
</div>

ALL_MONTHS.forEach(s => { const o=document.createElement('option'); o.value=s; o.textContent=MONTH_LABELS[s]; sel.appendChild(o); });

let activeTab='visao-geral', cGeral=null, cTimeline=null;

function fmt(min) {
  if(!min) return '—';
  const h=Math.floor(Math.abs(min)/60), m=Math.abs(min)%60, sg=min<0?'-':'';
  return sg+h+'h'+(m>0?String(m).padStart(2,'0'):'');
}

function getFiltered() {
  const q=document.getElementById('search').value.toLowerCase().trim();
  const so=document.getElementById('sort-by').value;
  let d=DATA.filter(c=>!q||c.name.toLowerCase().includes(q));
  if(so==='vence-desc') d=[...d].sort((a,b)=>b.months.reduce((s,m)=>s+m.vence_min,0)-a.months.reduce((s,m)=>s+m.vence_min,0));
  else if(so==='acum-desc') d=[...d].sort((a,b)=>(b.months.at(-1)?.acum_min||0)-(a.months.at(-1)?.acum_min||0));
  return d;
}

function switchTab(t) {
  activeTab=t;
  ['visao-geral','por-colaborador','timeline'].forEach(x => document.getElementById('tab-'+x).style.display=x===t?'':'none');
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));
  render();
}

document.querySelectorAll('.tab').forEach(el=>el.addEventListener('click',()=>switchTab(el.dataset.tab)));
['search','mes-filter','sort-by'].forEach(id=>document.getElementById(id).addEventListener('change',render));
document.getElementById('search').addEventListener('input',render);

// Gummy chart colors
const C_AZUL   = '#2B2BE6';
const C_AMARELO = '#E8FF00';
const C_AZUL_E  = '#1515B8';
const C_CLARO   = '#EEF0FF';

function renderVisaoGeral(data) {
  const vpm={};
  ALL_MONTHS.forEach(s=>vpm[s]=0);
  data.forEach(c=>c.months.forEach(m=>{if(m.vence_min>0) vpm[m.sort]=(vpm[m.sort]||0)+m.vence_min;}));

  const totalV=Object.values(vpm).reduce((a,b)=>a+b,0);
  const comV=data.filter(c=>c.months.some(m=>m.vence_min>0)).length;
  const pico=ALL_MONTHS.reduce((a,b)=>vpm[b]>vpm[a]?b:a,ALL_MONTHS[0]);
  const totalA=data.reduce((s,c)=>s+(c.months.at(-1)?.acum_min||0),0);

  const top=[...data].map(c=>({name:c.name,total:c.months.reduce((s,m)=>s+m.vence_min,0),acum:c.months.at(-1)?.acum_min||0}))
    .filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
  const maxV=Math.max(...top.map(x=>x.total),1);

  const labels=ALL_MONTHS.map(s=>MONTH_LABELS[s]);
  const vH=ALL_MONTHS.map(s=>+(vpm[s]/60).toFixed(1));
  const aM=ALL_MONTHS.map(s=>{
    const vs=data.map(c=>{const m=c.months.find(x=>x.sort===s);return m?m.acum_min:0;});
    return +(vs.reduce((a,b)=>a+b,0)/Math.max(vs.length,1)/60).toFixed(1);
  });

  document.getElementById('tab-visao-geral').innerHTML=`
    <div class="cards">
      <div class="card"><div class="card-label">Total a vencer</div><div class="card-value warn">${fmt(totalV)}</div></div>
      <div class="card"><div class="card-label">Colaboradores afetados</div><div class="card-value">${comV} de ${data.length}</div></div>
      <div class="card"><div class="card-label">Mês de pico</div><div class="card-value warn">${MONTH_LABELS[pico]||'—'}</div></div>
      <div class="card"><div class="card-label">Saldo acumulado total</div><div class="card-value ok">${fmt(totalA)}</div></div>
    </div>
    <div class="chart-box">
      <div class="section-hdr">Horas a vencer por mês</div>
      <div class="chart-inner">
        <div class="legend">
          <span class="legend-item"><span class="legend-sq" style="background:${C_AZUL}"></span>Horas a vencer</span>
          <span class="legend-item"><span class="legend-sq" style="background:${C_CLARO};border:1px solid ${C_AZUL}"></span>Saldo acum. médio</span>
        </div>
        <div style="position:relative;height:230px"><canvas id="chart-geral" role="img" aria-label="Horas a vencer por mês"></canvas></div>
      </div>
    </div>
    <div class="section-hdr">Ranking — maiores saldos a vencer</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Colaborador</th><th>Total a vencer</th><th>Distribuição</th><th>Saldo acum.</th></tr></thead>
        <tbody>${top.slice(0,15).map(x=>`
          <tr>
            <td style="font-weight:500">${x.name}</td>
            <td><span class="pill ${x.total>300?'pill-danger':'pill-warn'}">${fmt(x.total)}</span></td>
            <td><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(x.total/maxV*100)}%;background:${C_AZUL}"></div></div></div></td>
            <td style="color:var(--azul-med-f);font-weight:500">${fmt(x.acum)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  if(cGeral) cGeral.destroy();
  cGeral=new Chart(document.getElementById('chart-geral'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Horas a vencer',data:vH,backgroundColor:C_AZUL,borderRadius:0,order:1},
      {label:'Saldo médio',data:aM,type:'line',borderColor:C_AZUL,backgroundColor:'rgba(43,43,230,0.06)',
       borderDash:[4,3],fill:true,tension:0.3,borderWidth:1.5,pointRadius:3,
       pointBackgroundColor:C_AMARELO,pointBorderColor:C_AZUL,pointBorderWidth:1.5,order:0}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{autoSkip:false,maxRotation:45,font:{size:10,family:'Red Hat Display'}},grid:{display:false}},
        y:{ticks:{callback:v=>v+'h',font:{size:10,family:'Red Hat Display'}},grid:{color:'rgba(43,43,230,0.07)'}}
      }
    }
  });
}

function renderPorColaborador(data) {
  const mes=document.getElementById('mes-filter').value;
  const meses=mes?[mes]:ALL_MONTHS;
  const rows=data.map(c=>{
    const tv=c.months.filter(m=>meses.includes(m.sort)).reduce((s,m)=>s+m.vence_min,0);
    const la=c.months.at(-1)?.acum_min||0;
    return`<tr>
      <td style="font-weight:700;color:var(--azul-forte)">${c.name}</td>
      <td><span class="pill ${tv>300?'pill-danger':tv>0?'pill-warn':'pill-none'}">${fmt(tv)}</span></td>
      ${meses.map(s=>{const m=c.months.find(x=>x.sort===s);const v=m?m.vence_min:0;
        return`<td style="text-align:center">${v>0?`<span class="pill ${v>300?'pill-danger':'pill-warn'}">${fmt(v)}</span>`:'<span style="color:var(--borda)">—</span>'}</td>`;
      }).join('')}
      <td style="color:var(--azul-med-f);font-weight:500">${fmt(la)}</td>
    </tr>`;
  }).join('');

  document.getElementById('tab-por-colaborador').innerHTML=`
    <div class="section-hdr">Saldo a vencer por colaborador e mês</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="min-width:160px">Colaborador</th><th>Total a vencer</th>
          ${meses.map(s=>`<th style="text-align:center">${MONTH_LABELS[s]}</th>`).join('')}
          <th>Saldo acum.</th>
        </tr></thead>
        <tbody>${rows||'<tr><td colspan="20" class="no-data">Nenhum colaborador encontrado</td></tr>'}</tbody>
      </table>
    </div>`;
}

function renderTimeline(data) {
  const vpm={};
  ALL_MONTHS.forEach(s=>vpm[s]=0);
  data.forEach(c=>c.months.forEach(m=>{if(m.vence_min>0) vpm[m.sort]=(vpm[m.sort]||0)+m.vence_min;}));

  let acc=0;
  const cumul=ALL_MONTHS.map(s=>{acc+=vpm[s];return +(acc/60).toFixed(1);});
  const labels=ALL_MONTHS.map(s=>MONTH_LABELS[s]);

  const mes=document.getElementById('mes-filter').value;
  const meses=mes?[mes]:ALL_MONTHS;
  let rows='';
  meses.forEach(s=>{
    const lista=data.filter(c=>c.months.some(m=>m.sort===s&&m.vence_min>0));
    if(!lista.length) return;
    const tot=lista.reduce((sum,c)=>{const m=c.months.find(x=>x.sort===s);return sum+(m?m.vence_min:0);},0);
    rows+=`<tr class="month-row"><td colspan="3">${MONTH_LABELS[s]} <span class="alert">— ${fmt(tot)} a vencer</span></td></tr>`;
    lista.forEach(c=>{
      const mi=c.months.findIndex(x=>x.sort===s);
      const origem=mi>=6?c.months[mi-6]?.label||'—':'—';
      const m=c.months[mi];
      rows+=`<tr><td class="indent" style="font-weight:500">${c.name}</td>
        <td><span class="pill ${m.vence_min>300?'pill-danger':'pill-warn'}">${fmt(m.vence_min)}</span></td>
        <td style="color:var(--texto2);font-size:11px">crédito de ${origem}</td></tr>`;
    });
  });

  document.getElementById('tab-timeline').innerHTML=`
    <div class="chart-box">
      <div class="section-hdr">Horas a vencer — acumulado</div>
      <div class="chart-inner">
        <div style="position:relative;height:220px"><canvas id="chart-timeline" role="img" aria-label="Horas a vencer acumuladas"></canvas></div>
      </div>
    </div>
    <div class="section-hdr">Detalhe mensal</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Colaborador</th><th>Horas a vencer</th><th>Mês de origem</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="3" class="no-data">Nenhum vencimento no período selecionado</td></tr>'}</tbody>
      </table>
    </div>`;

  if(cTimeline) cTimeline.destroy();
  cTimeline=new Chart(document.getElementById('chart-timeline'),{
    type:'line',
    data:{labels,datasets:[{
      label:'Acumulado',data:cumul,
      borderColor:C_AZUL,backgroundColor:'rgba(43,43,230,0.06)',
      fill:true,tension:0.3,borderWidth:2,pointRadius:4,
      pointBackgroundColor:C_AMARELO,pointBorderColor:C_AZUL,pointBorderWidth:1.5
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{autoSkip:false,maxRotation:45,font:{size:10,family:'Red Hat Display'}},grid:{display:false}},
        y:{ticks:{callback:v=>v+'h',font:{size:10,family:'Red Hat Display'}},grid:{color:'rgba(43,43,230,0.07)'}}
      }
    }
  });
}

function render() {
  const d=getFiltered();
  if(activeTab==='visao-geral') renderVisaoGeral(d);
  else if(activeTab==='por-colaborador') renderPorColaborador(d);
  else renderTimeline(d);
}

render();
</script>
</body>
</html>
